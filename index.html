<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>서울 여행 한국어 퍼즐</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:   #16213e;
  --navy2:  #1e2d4e;
  --teal:   #0f9b82;
  --teal-l: #e2f5f1;
  --teal-t: #7ecfc3;
  --red:    #e03e3e;
  --red-l:  #fdf0f0;
  --red-t:  #f0a8a8;
  --amber:  #f59e0b;
  --amb-l:  #fef3c7;
  --bg:     #f2f4f7;
  --surf:   #ffffff;
  --text:   #111827;
  --text2:  #6b7280;
  --text3:  #adb5c4;
  --bdr:    #e5e7eb;
}
html, body {
  height: 100%;
  background: #8fa8be;
  display: flex;
  justify-content: center;
  font-family: 'Noto Sans KR', sans-serif;
}
.phone {
  width: 100%; max-width: 390px;
  min-height: 100dvh;
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

/* ── 상태바 ── */
.status-bar {
  background: var(--navy);
  padding: 10px 20px 8px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; z-index: 10;
}
.s-time  { color: rgba(255,255,255,.9); font-size:12px; font-weight:600; }
.s-right { display:flex; align-items:center; gap:10px; }
.s-title { color: rgba(255,255,255,.55); font-size:11px; letter-spacing:.4px; }
.s-xp    { color: #f0c060; font-size:11px; font-weight:700; }

/* ── 화면 전환 ── */
.screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
.screen.active { display:flex; }

@keyframes slideUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn    { from{opacity:0} to{opacity:1} }
@keyframes fadeUp    { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.anim-up   { animation: slideUp .28s ease both; }
.anim-down { animation: slideDown .28s ease both; }
.anim-in   { animation: fadeIn .22s ease both; }
.ain       { animation: fadeUp .22s ease both; }

/* ════════════════════════════════
   지도 화면
════════════════════════════════ */
#mapScreen { overflow-y: auto; }

.map-header {
  background: var(--navy);
  padding: 14px 20px 16px;
  flex-shrink: 0;
}
.map-header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.map-greeting { color:#fff; font-size:17px; font-weight:700; letter-spacing:-.3px; }
.map-total-xp {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 5px 12px;
  color: #f0c060; font-size:12px; font-weight:700;
}
.map-sub { color: rgba(255,255,255,.5); font-size:12px; }

.map-wrap {
  height: 240px; flex-shrink:0;
  overflow:hidden; background:#e4eef6; position:relative;
}
.map-wrap svg { width:100%; height:100%; display:block; }

/* 핀 탭 영역 오버레이 */
.pin-tap {
  position: absolute;
  cursor: pointer;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.loc-list {
  padding: 16px 16px 24px;
  display: flex; flex-direction: column; gap: 10px;
}
.loc-card {
  background: var(--surf);
  border-radius: 14px;
  border: 1px solid var(--bdr);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: transform .12s, box-shadow .12s;
}
.loc-card:active { transform: scale(.98); }
.loc-card.locked { opacity: .45; cursor: default; pointer-events: none; }
.loc-card.done   { border-color: var(--teal-t); }
.loc-card.active { border-color: var(--red-t); border-width: 1.5px; }

.loc-num {
  width: 36px; height: 36px; border-radius: 50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; flex-shrink:0;
}
.loc-num.done   { background: var(--teal-l); color: var(--teal); }
.loc-num.active { background: var(--red-l);  color: var(--red); }
.loc-num.locked { background: var(--bg);     color: var(--text3); }

.loc-info { flex:1; }
.loc-name { font-size:14px; font-weight:600; color:var(--text); }
.loc-desc { font-size:11.5px; color:var(--text2); margin-top:2px; }
.loc-grammar {
  display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;
}
.loc-g-chip {
  font-size:10px; font-weight:600;
  padding: 2px 7px; border-radius:20px;
  background: var(--amb-l); color: #92400e;
  border: 1px solid rgba(245,158,11,.2);
}
.loc-unit-chip {
  font-size:10px; font-weight:600;
  padding: 2px 7px; border-radius:20px;
  background: #eef2ff; color: #3730a3;
  border: 1px solid rgba(99,102,241,.2);
}

.loc-status {
  font-size:11px; font-weight:600; flex-shrink:0;
}
.loc-status.done   { color: var(--teal); }
.loc-status.active { color: var(--red); }
.loc-status.locked { color: var(--text3); }

/* ════════════════════════════════
   장소 진입 카드 화면
════════════════════════════════ */
#entryScreen {
  overflow-y: auto;
  background: var(--bg);
}

.entry-map-mini {
  height: 160px; flex-shrink:0;
  overflow:hidden; background:#e4eef6; position:relative;
}
.entry-map-mini svg { width:100%; height:100%; display:block; pointer-events:none; }

/* 지도 위 뒤로가기 버튼 */
.map-back-btn {
  position: absolute;
  top: 10px; left: 12px;
  background: rgba(255,255,255,.88);
  border: 0.5px solid rgba(0,0,0,.1);
  border-radius: 20px;
  padding: 5px 12px 5px 8px;
  font-size: 12px; font-weight: 600;
  color: var(--navy);
  cursor: pointer;
  font-family: inherit;
  backdrop-filter: blur(4px);
  display: flex; align-items: center; gap: 3px;
  transition: background .15s;
  z-index: 10;
}
.map-back-btn:hover { background: rgba(255,255,255,.98); }

.entry-body {
  flex:1; padding: 20px 20px 0;
  display:flex; flex-direction:column; gap:14px;
  overflow-y: auto;
}

.entry-place-tag {
  display:flex; align-items:center; gap:8px;
}
.entry-num {
  width:28px; height:28px; border-radius:50%;
  background: var(--red-l); color:var(--red);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; flex-shrink:0;
}
.entry-place-name { font-size:20px; font-weight:700; letter-spacing:-.5px; color:var(--text); }
.entry-place-sub  { font-size:13px; color:var(--text2); margin-top:3px; }

.entry-chat {
  display:flex; flex-direction:column; gap:10px;
}
.msg-row { display:flex; gap:8px; align-items:flex-start; }
.msg-row.self { justify-content:flex-end; }
.avatar-sm {
  width:28px; height:28px; border-radius:50%;
  background: var(--navy);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:rgba(255,255,255,.75);
  flex-shrink:0;
}
.bbl-f {
  background: #f0f2f5;
  border-radius: 14px 14px 14px 4px;
  padding: 10px 13px; font-size:13.5px; line-height:1.55;
  color:var(--text); max-width:240px;
}
.bbl-s {
  background: var(--navy);
  border-radius: 14px 14px 4px 14px;
  padding: 10px 13px; font-size:13.5px; line-height:1.55;
  color:#fff; max-width:240px;
}
.bbl-f strong { color:#3a86ff; font-weight:700; }

.entry-grammar-card {
  background: var(--surf);
  border-radius: 14px; border: 1px solid var(--bdr);
  padding: 14px 16px;
}
.entry-grammar-label {
  font-size:10px; font-weight:700; letter-spacing:.8px;
  text-transform:uppercase; color:var(--text3); margin-bottom:10px;
}
.entry-grammar-chips { display:flex; flex-wrap:wrap; gap:6px; }
.entry-g-chip {
  background: var(--amb-l); color:#92400e;
  font-size:12px; font-weight:600;
  padding: 5px 12px; border-radius:20px;
  border: 1px solid rgba(245,158,11,.25);
}

.entry-btn-area { padding: 16px 20px 24px; flex-shrink:0; }
.btn-start {
  width:100%; padding:15px;
  background: var(--navy); color:#fff;
  border:none; border-radius:14px;
  font-family:inherit; font-size:15px; font-weight:700;
  cursor:pointer; letter-spacing:-.2px;
  transition: transform .1s;
}
.btn-start:active { transform: scale(.98); }

/* ════════════════════════════════
   퍼즐 화면 (기존 v4)
════════════════════════════════ */
#puzzleScreen { overflow: hidden; }

.puzzle-map-mini {
  height: 140px; flex-shrink:0;
  overflow:hidden; background:#e4eef6; position:relative;
}
.puzzle-map-mini svg { width:100%; height:100%; display:block; pointer-events:none; }

.stage-bar {
  background: var(--surf); border-bottom: 1px solid var(--bdr);
  padding: 9px 16px 7px;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.s-name { font-size:13px; font-weight:600; color:var(--text); }
.s-sub  { font-size:11px; color:var(--text2); margin-top:1px; }
.xp-pill {
  background: var(--amb-l); color:#92400e;
  font-size:11px; font-weight:700;
  padding: 4px 10px; border-radius:20px;
  border: 1px solid rgba(245,158,11,.25); white-space:nowrap;
}
.prog-row {
  display:flex; gap:3px; padding:0 16px 8px;
  background:var(--surf); flex-shrink:0;
}
.prog-seg { flex:1; height:3px; border-radius:2px; background:var(--bdr); transition:background .4s; }
.prog-seg.done   { background:var(--teal); }
.prog-seg.active { background:var(--navy); }

.scroll-area {
  flex:1; overflow-y:auto;
  padding: 12px 14px 0;
  display:flex; flex-direction:column; gap:10px;
  -webkit-overflow-scrolling: touch;
}

/* 번역 래퍼 */
.bbl-f-wrap { display:flex; flex-direction:column; gap:4px; max-width:240px; }
.bbl-s-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:4px; max-width:240px; }
.bbl-s-wrap .bbl-s { align-self:flex-end; }

/* 번역 텍스트 — 말풍선 안, 구분선 아래 */
.bbl-trans {
  display: none;
  border-top: 1px solid rgba(0,0,0,.08);
  margin-top: 6px;
  padding-top: 6px;
  font-size: 11.5px;
  line-height: 1.5;
  color: rgba(0,0,0,.42);
}
.bbl-s .bbl-trans { color: rgba(255,255,255,.55); border-top-color: rgba(255,255,255,.18); }
.bbl-trans.show { display: block; }

/* 말풍선 헤더: 텍스트 + 🌐 버튼 한 줄 */
.bbl-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 6px;
}
.bbl-text { flex: 1; }

/* 🌐 버튼 */
.trans-btn {
  flex-shrink: 0;
  background: none;
  border: none;
  padding: 0;
  font-size: 12px;
  cursor: pointer;
  opacity: 0.35;
  transition: opacity .15s;
  line-height: 1;
  margin-top: 1px;
}
.trans-btn:hover { opacity: 0.75; }
.trans-btn.active { opacity: 1; }

/* 퍼즐 카드 */
.p-card {
  background:var(--surf); border-radius:14px;
  border:1px solid var(--bdr); overflow:hidden; flex-shrink:0;
}
.p-card-hd {
  padding:9px 13px 7px; border-bottom:1px solid var(--bdr);
  display:flex; align-items:center; justify-content:space-between;
}
.p-card-lbl { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.8px; text-transform:uppercase; }
.g-badge {
  background:var(--amb-l); color:#92400e;
  font-size:10px; font-weight:700;
  padding:2px 8px; border-radius:20px;
  border:1px solid rgba(245,158,11,.2);
}
.p-hint { font-size:11.5px; color:var(--text2); padding:7px 13px 0; }
.slot-wrap { padding:7px 10px 10px; }
.slot-area {
  min-height:44px; border:1.5px dashed var(--bdr);
  border-radius:10px; padding:6px 8px;
  display:flex; flex-wrap:wrap; gap:5px; align-items:center;
  background:var(--bg); transition:border-color .25s, background .25s;
}
.slot-area.ok { border-color:var(--teal); background:var(--teal-l); }
.slot-area.ng { border-color:var(--red);  background:var(--red-l); }
.slot-ph { font-size:12px; color:var(--text3); padding:2px 4px; }

.chip {
  padding:6px 12px; border-radius:20px;
  font-size:13px; font-weight:500;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; user-select:none;
  transition:transform .1s, background .15s, opacity .15s;
  border:1.5px solid transparent; white-space:nowrap;
}
.chip:active { transform:scale(.94); }
.chip-s  { background:var(--navy); color:#fff; }
.chip-s:hover { background:var(--navy2); }
.chip-s.cor { background:var(--teal); color:#fff; cursor:default; }
.chip-s.wrg { background:var(--red-l); color:var(--red); border-color:var(--red-t); text-decoration:line-through; cursor:default; }
.chip-t  { background:var(--surf); color:var(--text); border-color:var(--bdr); box-shadow:0 2px 0 var(--bdr); }
.chip-t:hover { background:#f5f7fa; transform:translateY(-1px); box-shadow:0 3px 0 var(--bdr); }
.chip-t.used { opacity:.25; pointer-events:none; box-shadow:none; }

.tray { background:var(--surf); border-top:1px solid var(--bdr); padding:10px 14px 12px; flex-shrink:0; }
.tray-lbl { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.6px; margin-bottom:8px; }
.tray-chips { display:flex; flex-wrap:wrap; gap:7px; }

.btn-bar { background:var(--surf); border-top:1px solid var(--bdr); padding:10px 14px 14px; display:flex; gap:8px; flex-shrink:0; }
.btn { border:none; border-radius:12px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; padding:13px 0; transition:transform .1s; }
.btn:active { transform:scale(.97); }
.btn-hint  { flex:1; background:var(--bg); color:var(--text2); border:1.5px solid var(--bdr); font-size:13px; }
.btn-hint:hover  { background:#e8ebf0; }
.btn-hint:disabled { opacity:.35; cursor:default; }
.btn-check { flex:2; background:var(--navy); color:#fff; }
.btn-check:hover { background:var(--navy2); }
.btn-check:disabled { opacity:.3; cursor:default; }
.btn-next  { flex:1; background:var(--teal); color:#fff; }
.btn-retry { flex:1; background:var(--bg); color:var(--text2); border:1.5px solid var(--bdr); font-size:13px; }

/* 결과 말풍선 */
.res-row { display:flex; gap:8px; align-items:flex-end; }
.bbl-ok { background:var(--teal-l); border:1px solid var(--teal-t); border-radius:14px 14px 14px 4px; padding:10px 13px; font-size:13px; line-height:1.6; color:var(--text); max-width:260px; }
.bbl-ng { background:var(--red-l); border:1px solid var(--red-t); border-radius:14px 14px 14px 4px; padding:10px 13px; font-size:13px; line-height:1.6; color:var(--text); max-width:260px; }
.res-lbl { font-size:12px; font-weight:700; margin-bottom:4px; }
.res-lbl.ok { color:var(--teal); }
.res-lbl.ng { color:var(--red); }
.res-sent { font-size:13px; font-weight:600; color:var(--teal); font-family:'Noto Sans KR',sans-serif; margin-bottom:6px; }
.g-tip { font-size:12px; color:var(--text2); background:rgba(255,255,255,.75); border-radius:8px; padding:7px 9px; line-height:1.65; margin-top:6px; }
.g-tip strong { color:var(--text); font-weight:700; }

/* ════════════════════════════════
   장소 완료 화면
════════════════════════════════ */
#completeScreen { overflow-y:auto; }

.complete-hero {
  background: var(--navy);
  padding: 32px 24px 28px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  flex-shrink:0;
}
.complete-check {
  width:60px; height:60px; border-radius:50%;
  background: rgba(15,155,130,.3);
  border: 2px solid rgba(15,155,130,.6);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:#fff; margin-bottom:4px;
}
.complete-place { font-size:22px; font-weight:700; color:#fff; letter-spacing:-.5px; }
.complete-sub-txt { font-size:13px; color:rgba(255,255,255,.55); text-align:center; }
.complete-xp-big { font-size:42px; font-weight:700; color:#f0c060; letter-spacing:-2px; margin-top:4px; }
.complete-xp-big span { font-size:16px; font-weight:500; color:rgba(255,255,255,.5); margin-left:4px; }

.complete-body { padding:20px 20px 32px; display:flex; flex-direction:column; gap:14px; }

.grammar-review-card {
  background:var(--surf); border-radius:14px;
  border:1px solid var(--bdr); padding:16px;
}
.gr-label { font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--text3); margin-bottom:10px; }
.gr-chips { display:flex; flex-wrap:wrap; gap:6px; }
.gr-chip {
  background:var(--teal-l); color:#0a6b58;
  border:1px solid var(--teal-t);
  border-radius:20px; padding:5px 13px;
  font-size:12px; font-weight:600;
}

.stat-row { display:flex; gap:10px; }
.stat-card {
  flex:1; background:var(--surf);
  border-radius:14px; border:1px solid var(--bdr);
  padding:14px; text-align:center;
}
.stat-val { font-size:24px; font-weight:700; color:var(--text); }
.stat-lbl { font-size:11px; color:var(--text2); margin-top:3px; }

.btn-to-map {
  width:100%; padding:15px;
  background:var(--teal); color:#fff;
  border:none; border-radius:14px;
  font-family:inherit; font-size:15px; font-weight:700;
  cursor:pointer; transition:transform .1s; letter-spacing:-.2px;
}
.btn-to-map:active { transform:scale(.98); }
.btn-replay {
  width:100%; padding:13px;
  background:transparent; color:var(--text2);
  border:1.5px solid var(--bdr); border-radius:14px;
  font-family:inherit; font-size:14px; font-weight:600;
  cursor:pointer;
}

/* ── XP 토스트 ── */
.xp-toast {
  position:fixed; top:210px;
  left:50%; transform:translateX(-50%) translateY(-8px);
  background:var(--navy); color:var(--amber);
  font-size:18px; font-weight:700;
  padding:10px 22px; border-radius:24px;
  pointer-events:none; opacity:0;
  transition:opacity .18s, transform .18s;
  z-index:9999; white-space:nowrap;
}
.xp-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── 핀 완료 애니메이션 ── */
@keyframes pinPop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
.pin-pop { animation: pinPop .4s ease; }

/* ════════════════════════════════
   이름 입력 화면
════════════════════════════════ */
#nameScreen {
  align-items: center;
  justify-content: center;
  background: var(--navy);
}
.name-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 32px; gap: 28px; width: 100%;
}
.name-logo {
  font-size: 52px; line-height: 1;
}
.name-title {
  color: #fff; font-size: 24px; font-weight: 700;
  text-align: center; letter-spacing: -.4px;
}
.name-sub {
  color: rgba(255,255,255,.5); font-size: 13.5px;
  text-align: center; line-height: 1.55;
  margin-top: -12px;
}
.name-field-wrap {
  width: 100%; display: flex; flex-direction: column; gap: 8px;
}
.name-label {
  color: rgba(255,255,255,.6); font-size: 11px; font-weight: 600;
  letter-spacing: .6px; text-transform: uppercase;
}
.name-input {
  width: 100%;
  background: rgba(255,255,255,.08);
  border: 1.5px solid rgba(255,255,255,.15);
  border-radius: 14px;
  padding: 14px 18px;
  font-size: 18px; font-weight: 600;
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color .18s;
  text-align: center;
  letter-spacing: .5px;
}
.name-input::placeholder { color: rgba(255,255,255,.25); font-weight: 400; }
.name-input:focus { border-color: var(--teal); }
.name-start-btn {
  width: 100%;
  background: var(--teal);
  color: #fff; font-size: 16px; font-weight: 700;
  border: none; border-radius: 14px;
  padding: 15px; cursor: pointer;

const state = {
  totalXp: 0,
  playerName: '',          // 플레이어 이름
  completed: new Set(),   // 완료된 장소 id
  currentLoc: null,       // 현재 진행 중인 장소 id
  puzzleIdx: 0,
  slotWords: [],
  hintsLeft: 3,
  hintUsed: false,
  answered: false,
  sessionXp: 0,           // 이번 장소에서 획득한 XP
  sessionCorrect: 0,
  sessionHints: 0,
};

// ══════════════════════════════════════════
// 이름 입력
// ══════════════════════════════════════════
function onNameInput() {
  const val = document.getElementById('nameInput').value.trim();
  document.getElementById('nameStartBtn').disabled = val.length === 0;
}

function endsWithBatchim(str) {
  if (!str) return false;
  const code = str.charCodeAt(str.length - 1) - 0xAC00;
  if (code < 0 || code > 11171) return false;
  return code % 28 !== 0;
}

// [이름]이에요. / [이름]예요? 토큰을 실제 이름으로 치환
function resolveNameToken(token) {
  if (!state.playerName) return token;
  const name = state.playerName;
  const hasBatchim = endsWithBatchim(name);
  return token
    .replace(/\[이름\]이에요\./g,  hasBatchim ? name + '이에요.' : name + '예요.')
    .replace(/\[이름\]예요\?/g,    hasBatchim ? name + '예요?'   : name + '이에요?')
    .replace(/\[이름\]이에요\?/g,  hasBatchim ? name + '예요?'   : name + '이에요?')
    .replace(/\[이름\]/g, name);
}

function submitName() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  state.playerName = val;
  renderMapScreen();
  showScreen('mapScreen', 'anim-up');
}

// ══════════════════════════════════════════
// 화면 전환
// ══════════════════════════════════════════
function showScreen(id, animClass = 'anim-up') {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  target.classList.add('active', animClass);
  setTimeout(() => target.classList.remove(animClass), 400);
  if (id !== 'puzzleScreen') target.scrollTop = 0;
}

// 지도 화면

function renderMapScreen() {
  document.getElementById('mapXpBadge').textContent  = state.totalXp + ' XP';
  document.getElementById('globalXp').textContent    = state.totalXp + ' XP';
  document.getElementById('mapProgress').textContent = state.completed.size + ' / 10 장소 완료';
  const greeting = document.getElementById('mapGreeting');
  if (greeting) greeting.textContent = state.playerName ? state.playerName + ' 씨의 서울 여행 🗺️' : '서울 여행 🗺️';

  renderMapPins('pinsMain', 'routeMain', 390, 240, 1.26);
  renderLocList();
}

function renderMapPins(pinsId, routeId, W, H, scale) {
  const g = document.getElementById(pinsId);
  const route = document.getElementById(routeId);
  if (!g) return;
  g.innerHTML = '';

  const scaleX = x => x * (W / 390);
  const scaleY = y => y * (H / 190) * (scale || 1);

  // 경로선
  const doneLocs = LOCATIONS.filter(l => state.completed.has(l.id) || l.id === state.currentLoc);
  if (doneLocs.length >= 2 && route) {
    const pts = doneLocs.map(l => `${scaleX(l.x)},${scaleY(l.y) - 14}`).join(' ');
    route.setAttribute('points', pts);
  }

  LOCATIONS.forEach(l => {
    const x = scaleX(l.x);
    const y = scaleY(l.y);
    const isDone   = state.completed.has(l.id);
    const isActive = l.id === state.currentLoc;
    const isLocked = !isDone && !isActive && !isNextUnlocked(l);

    const grp = document.createElementNS('http://www.w3.org/2000/svg','g');
    grp.setAttribute('id', 'map-pin-' + l.id);

    if (isDone) {
      grp.innerHTML = `
        <line x1="${x}" y1="${y-14}" x2="${x}" y2="${y-4}" stroke="#0f9b82" stroke-width="1.5"/>
        <circle cx="${x}" cy="${y-17}" r="9" fill="#0f9b82" stroke="#fff" stroke-width="1.8"/>
        <circle cx="${x}" cy="${y-17}" r="3.5" fill="#fff"/>
        <rect x="${x-15}" y="${y+2}" width="30" height="11" rx="3" fill="rgba(255,255,255,.9)"/>
        <text x="${x}" y="${y+11}" text-anchor="middle" font-size="7" font-weight="700" fill="#0a6b58" font-family="'Noto Sans KR',sans-serif">${l.name}</text>`;
    } else if (isActive) {
      grp.innerHTML = `
        <line x1="${x}" y1="${y-14}" x2="${x}" y2="${y-4}" stroke="#e03e3e" stroke-width="2"/>
        <circle cx="${x}" cy="${y-17}" r="11" fill="#e03e3e" stroke="#fff" stroke-width="2"/>
        <circle cx="${x}" cy="${y-17}" r="4.5" fill="#fff"/>
        <circle cx="${x}" cy="${y-17}" r="16" fill="none" stroke="#e03e3e" stroke-width="1.5" opacity=".3">
          <animate attributeName="r" values="11;19;11" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".3;0;.3" dur="2s" repeatCount="indefinite"/>
        </circle>
        <rect x="${x-20}" y="${y+2}" width="40" height="12" rx="3" fill="rgba(255,255,255,.95)"/>
        <text x="${x}" y="${y+12}" text-anchor="middle" font-size="7" font-weight="700" fill="#c02020" font-family="'Noto Sans KR',sans-serif">${l.name}</text>`;
    } else {
      const op = isLocked ? '.35' : '.55';
      grp.setAttribute('opacity', op);
      grp.innerHTML = `
        <circle cx="${x}" cy="${y-14}" r="7" fill="#adb5c4" stroke="#fff" stroke-width="1.5"/>
        <circle cx="${x}" cy="${y-14}" r="2.5" fill="#fff"/>
        <rect x="${x-15}" y="${y+0}" width="30" height="11" rx="3" fill="rgba(255,255,255,.8)"/>
        <text x="${x}" y="${y+9}" text-anchor="middle" font-size="6.5" font-weight="600" fill="#7a8494" font-family="'Noto Sans KR',sans-serif">${l.name}</text>`;
    }

    if (!isLocked) {
      grp.style.cursor = 'pointer';
      grp.onclick = () => openEntry(l.id);
    }
    g.appendChild(grp);
  });
}

function isNextUnlocked(loc) {
  const idx = LOCATIONS.findIndex(l => l.id === loc.id);
  if (idx === 0) return true;
  return state.completed.has(LOCATIONS[idx - 1].id);
}

function renderLocList() {
  const list = document.getElementById('locList');
  list.innerHTML = '';
  LOCATIONS.forEach(l => {
    const isDone   = state.completed.has(l.id);
    const isActive = l.id === state.currentLoc || (!isDone && isNextUnlocked(l) && l.id !== state.currentLoc);
    const isLocked = !isDone && !isNextUnlocked(l);
    const stateClass = isDone ? 'done' : isActive ? 'active' : 'locked';
    const statusText = isDone ? '복습하기 →' : isActive ? '도전 가능' : '잠금';

    const card = document.createElement('div');
    card.className = `loc-card ${stateClass}`;
    if (!isLocked) card.onclick = () => openEntry(l.id);

    card.innerHTML = `
      <div class="loc-num ${stateClass}">${l.num}</div>
      <div class="loc-info">
        <div class="loc-name">${l.name}</div>
        <div class="loc-desc">${l.desc}</div>
        <div class="loc-grammar">
          <span class="loc-unit-chip">연세 1권 ${l.unit}</span>
          ${l.grammar.map(g=>`<span class="loc-g-chip">${g}</span>`).join('')}
        </div>
      </div>
      <div class="loc-status ${stateClass}">${statusText}</div>`;
    list.appendChild(card);
  });
}

// 진입 카드 화면
// ══════════════════════════════════════════
function openEntry(locId) {
  const loc = LOCATIONS.find(l => l.id === locId);
  if (!loc) return;
  if (!isNextUnlocked(loc) && !state.completed.has(locId)) return;

  state.currentLoc = locId;
  renderMapPins('entryPins', 'entryRoute', 390, 160, 0.84);

  const body = document.getElementById('entryBody');
  body.innerHTML = '';

  // 장소명
  const header = document.createElement('div');
  header.className = 'ain';
  header.innerHTML = `
    <div class="entry-place-tag">
      <div class="entry-num">${loc.num}</div>
      <div>
        <div class="entry-place-name">${loc.name}</div>
        <div class="entry-place-sub">${loc.desc}</div>
      </div>
    </div>`;
  body.appendChild(header);

  // 진입 대화 (장소별 전용 데이터)
  const intro   = ENTRY_INTROS[locId];
  const chatDiv = document.createElement('div');
  chatDiv.className = 'entry-chat ain';
  chatDiv.innerHTML = intro.messages.map(m => {
    const txt = resolveNameToken(m.text);
    return m.type === 'friend'
      ? `<div class="msg-row"><div class="avatar-sm">친</div><div class="bbl-f">${txt}</div></div>`
      : `<div class="msg-row self"><div class="bbl-s">${txt}</div></div>`;
  }).join('');
  body.appendChild(chatDiv);

  // 문법 카드
  const puzzles  = STAGE_PUZZLES[locId];
  const grammars = [...new Set(puzzles.map(p => p.grammar))];
  const gCard = document.createElement('div');
  gCard.className = 'entry-grammar-card ain';
  gCard.innerHTML = `
    <div class="entry-grammar-label">이번 장소에서 배울 문법</div>
    <div class="entry-grammar-chips">${grammars.map(g=>`<div class="entry-g-chip">${g}</div>`).join('')}</div>`;
  body.appendChild(gCard);

  showScreen('entryScreen', 'anim-up');
}

function startPuzzle() {
  const loc = LOCATIONS.find(l => l.id === state.currentLoc);
  state.puzzleIdx = 0;
  state.sessionXp = 0;
  state.sessionCorrect = 0;
  state.sessionHints = 0;
  state.hintsLeft = 3;

  document.getElementById('puzzleStageName').textContent = `${loc.num}번째 장소 — ${loc.name}`;
  document.getElementById('puzzleStageSub').textContent  = loc.desc;

  renderMapPins('puzzlePins', 'puzzleRoute', 390, 140, 0.74);
  loadPuzzle(0);
  showScreen('puzzleScreen', 'anim-up');
}

// ══════════════════════════════════════════
// 퍼즐 화면
// ══════════════════════════════════════════
function loadPuzzle(i) {
  state.puzzleIdx = i;
  state.slotWords = [];
  state.hintUsed  = false;
  state.answered  = false;

  const puzzles = STAGE_PUZZLES[state.currentLoc];
  // [이름] 토큰을 실제 이름으로 치환 (deep-clone으로 원본 보호)
  const raw = puzzles[i];
  const p = {
    ...raw,
    friendMsg:  resolveNameToken(raw.friendMsg  || ''),
    friendMsg2: raw.friendMsg2 ? resolveNameToken(raw.friendMsg2) : raw.friendMsg2,
    selfMsg:    raw.selfMsg    ? resolveNameToken(raw.selfMsg)    : raw.selfMsg,
    hintText:   resolveNameToken(raw.hintText   || ''),
    answer:      raw.answer.map(resolveNameToken),
    distractors: raw.distractors.map(resolveNameToken),
  };

  // 진행 바
  const row = document.getElementById('progRow');
  row.innerHTML = '';
  puzzles.forEach((_,j) => {
    const s = document.createElement('div');
    s.className = 'prog-seg' + (j<i?' done':j===i?' active':'');
    row.appendChild(s);
  });

  // XP 표시
  document.getElementById('puzzleXpPill').textContent = state.totalXp + ' XP';

  // 채팅
  const area = document.getElementById('scrollArea');
  area.innerHTML = '';
  addBubble(area, 'friend', p.friendMsg,  p.friendMsgT);
  if (p.selfMsg)    addBubble(area, 'self',   p.selfMsg,    p.selfMsgT);
  if (p.friendMsg2) addBubble(area, 'friend', p.friendMsg2, p.friendMsg2T);

  // 퍼즐 카드
  const card = document.createElement('div');
  card.className = 'p-card ain';
  card.innerHTML = `
    <div class="p-card-hd">
      <span class="p-card-lbl">문장 완성하기</span>
      <span class="g-badge">${p.grammar}</span>
    </div>
    <div class="p-hint">${p.hintText}</div>
    <div class="slot-wrap">
      <div class="slot-area" id="slotArea">
        <span class="slot-ph">카드를 탭해서 여기에 놓으세요</span>
      </div>
    </div>`;
  area.appendChild(card);

  // 트레이
  const tray = document.getElementById('trayChips');
  tray.innerHTML = '';
  shuffle([...p.answer, ...p.distractors]).forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'chip chip-t';
    btn.textContent = w; btn.dataset.word = w;
    btn.onclick = () => tapTray(btn);
    tray.appendChild(btn);
  });

  updateCheck();
  showDefaultBtns();
  // 새 퍼즐 로드 시 스크롤을 맨 위로 리셋해서 첫 말풍선이 잘리지 않게 함
  const scrollArea = document.getElementById('scrollArea');
  if (scrollArea) scrollArea.scrollTop = 0;
}

function addBubble(area, type, html, translation) {
  const row = document.createElement('div');
  row.className = 'msg-row' + (type==='self'?' self':'') + ' ain';
  const transBtn   = translation ? `<button class="trans-btn" onclick="toggleTrans(this)">🌐</button>` : '';
  const transBlock = translation ? `<div class="bbl-trans">${translation}</div>` : '';
  const inner = `<div class="bbl-header"><span class="bbl-text">${html}</span>${transBtn}</div>${transBlock}`;
  if (type === 'friend') {
    row.innerHTML = `
      <div class="avatar-sm">친</div>
      <div class="bbl-f-wrap"><div class="bbl-f">${inner}</div></div>`;
  } else {
    row.innerHTML = `
      <div class="bbl-s-wrap"><div class="bbl-s">${inner}</div></div>`;
  }
  area.appendChild(row);
}

function toggleTrans(btn) {
  const bubble = btn.closest('.bbl-f, .bbl-s');
  const trans  = bubble?.querySelector('.bbl-trans');
  if (!trans) return;
  const on = trans.classList.toggle('show');
  btn.classList.toggle('active', on);
}

function tapTray(btn) {
  if (state.answered || btn.classList.contains('used')) return;
  btn.classList.add('used');
  state.slotWords.push(btn.dataset.word);
  renderSlot(); updateCheck();
}

function renderSlot(result) {
  const slot = document.getElementById('slotArea');
  if (!slot) return;
  if (!state.slotWords.length) {
    slot.innerHTML = '<span class="slot-ph">카드를 탭해서 여기에 놓으세요</span>'; return;
  }
  const p = STAGE_PUZZLES[state.currentLoc][state.puzzleIdx];
  slot.innerHTML = '';
  state.slotWords.forEach((w, i) => {
    const c = document.createElement('div');
    c.className = 'chip chip-s';
    if (result === 'correct') c.classList.add('cor');
    else if (result === 'wrong') c.classList.add(p.answer[i] === w ? 'cor' : 'wrg');
    c.textContent = w;
    if (!result) c.onclick = () => removeSlot(i);
    slot.appendChild(c);
  });
}

function removeSlot(i) {
  if (state.answered) return;
  const w = state.slotWords[i];
  state.slotWords.splice(i, 1);
  const t = [...document.querySelectorAll('#trayChips .chip-t')].find(b => b.dataset.word===w && b.classList.contains('used'));
  if (t) t.classList.remove('used');
  renderSlot(); updateCheck();
}

function updateCheck() {
  const btn = document.getElementById('btnCheck');
  if (btn) btn.disabled = !state.slotWords.length;
}

function checkAnswer() {
  if (state.answered) return;
  const p  = STAGE_PUZZLES[state.currentLoc][state.puzzleIdx];
  const ok = JSON.stringify(state.slotWords) === JSON.stringify(p.answer);
  state.answered = true;

  const slot = document.getElementById('slotArea');
  slot.className = 'slot-area ' + (ok ? 'ok' : 'ng');
  renderSlot(ok ? 'correct' : 'wrong');

  const xp = ok ? (state.hintUsed ? 10 : 20) : 5;
  state.totalXp    += xp;
  state.sessionXp  += xp;
  if (ok) state.sessionCorrect++;
  document.getElementById('puzzleXpPill').textContent = state.totalXp + ' XP';
  document.getElementById('globalXp').textContent     = state.totalXp + ' XP';
  showXpToast('+' + xp + ' XP');

  const area = document.getElementById('scrollArea');
  setTimeout(() => {
    const row = document.createElement('div');
    row.className = 'res-row ain';
    row.innerHTML = ok
      ? `<div class="avatar-sm">친</div>
         <div class="bbl-ok"><div class="res-lbl ok">잘했어요! 👍</div><div class="g-tip">${p.tip}</div></div>`
      : `<div class="avatar-sm">친</div>
         <div class="bbl-ng"><div class="res-lbl ng">다시 확인해봐요</div><div class="res-sent">${p.answer.join(' ')}</div><div class="g-tip">${p.tip}</div></div>`;
    area.appendChild(row);
    scrollBot();
  }, 300);

  document.getElementById('btnBar').innerHTML = ok
    ? `<button class="btn btn-next" style="flex:1" onclick="nextPuzzle()">다음 문장 →</button>`
    : `<button class="btn btn-retry" onclick="retryPuzzle()">다시 풀기</button>
       <button class="btn btn-next" onclick="nextPuzzle()">다음으로 →</button>`;
}

function showDefaultBtns() {
  document.getElementById('btnBar').innerHTML = `
    <button class="btn btn-hint" id="btnHint" onclick="useHint()" ${state.hintsLeft===0?'disabled':''}>힌트 (${state.hintsLeft})</button>
    <button class="btn btn-check" id="btnCheck" onclick="checkAnswer()" disabled>확인하기</button>`;
}

function useHint() {
  if (!state.hintsLeft || state.answered) return;
  state.hintsLeft--; state.hintUsed = true; state.sessionHints++;
  const first = STAGE_PUZZLES[state.currentLoc][state.puzzleIdx].answer[0];
  if (!state.slotWords.includes(first)) {
    const t = [...document.querySelectorAll('#trayChips .chip-t')].find(b => b.dataset.word===first && !b.classList.contains('used'));
    if (t) t.classList.add('used');
    state.slotWords = [first, ...state.slotWords.filter(w => w !== first)];
    renderSlot(); updateCheck();
  }
  const hintBtn = document.getElementById('btnHint');
  if (hintBtn) {
    hintBtn.textContent = `힌트 (${state.hintsLeft})`;
    if (!state.hintsLeft) hintBtn.disabled = true;
  }
}

function retryPuzzle() {
  state.slotWords = []; state.hintUsed = false; state.answered = false;
  const slot = document.getElementById('slotArea');
  slot.className = 'slot-area';
  slot.innerHTML  = '<span class="slot-ph">카드를 탭해서 여기에 놓으세요</span>';
  document.querySelectorAll('#trayChips .chip-t').forEach(b => b.classList.remove('used'));
  const last = document.querySelector('.res-row');
  if (last) last.remove();
  updateCheck(); showDefaultBtns();
}

function nextPuzzle() {
  const puzzles = STAGE_PUZZLES[state.currentLoc];
  if (state.puzzleIdx + 1 >= puzzles.length) {
    showComplete();
  } else {
    loadPuzzle(state.puzzleIdx + 1);
  }
}

// ══════════════════════════════════════════
// 장소 완료 화면
// ══════════════════════════════════════════
function showComplete() {
  const loc     = LOCATIONS.find(l => l.id === state.currentLoc);
  const puzzles = STAGE_PUZZLES[state.currentLoc];

  state.completed.add(state.currentLoc);

  document.getElementById('completePlaceName').textContent = loc.name + ' 완료!';
  document.getElementById('completeXpBig').innerHTML       = state.sessionXp + ' <span>XP</span>';
  document.getElementById('statCorrect').textContent       = state.sessionCorrect + ' / ' + puzzles.length;
  document.getElementById('statHints').textContent         = state.sessionHints;
  document.getElementById('statTotal').textContent         = state.totalXp + ' XP';

  const grammars = [...new Set(puzzles.map(p => p.grammar))];
  document.getElementById('grChips').innerHTML = grammars.map(g => `<div class="gr-chip">${g}</div>`).join('');

  showScreen('completeScreen', 'anim-up');
}

// ══════════════════════════════════════════
// 지도 복귀
// ══════════════════════════════════════════
function returnToMap() {
  // 다음 열릴 장소 설정
  const nextIdx = LOCATIONS.findIndex(l => l.id === state.currentLoc) + 1;
  if (nextIdx < LOCATIONS.length) {
    state.currentLoc = LOCATIONS[nextIdx].id;
  } else {
    state.currentLoc = null;
  }

  renderMapScreen();
  showScreen('mapScreen', 'anim-down');

  // 완료 핀 팝 애니메이션
  setTimeout(() => {
    const completedLoc = LOCATIONS.find(l => state.completed.has(l.id) && l.id !== state.currentLoc);
    if (completedLoc) {
      const pin = document.getElementById('map-pin-' + completedLoc.id);
      if (pin) { pin.classList.add('pin-pop'); setTimeout(() => pin.classList.remove('pin-pop'), 500); }
    }
  }, 200);
}

function replayStage() {
  state.completed.delete(state.currentLoc);
  state.sessionXp      = 0;
  state.sessionCorrect = 0;
  state.sessionHints   = 0;
  state.hintsLeft      = 3;
  startPuzzle();
}

// ══════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════
function showXpToast(text) {
  const el = document.getElementById('xpToast');
  el.textContent = text; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}
function scrollBot() {
  const a = document.getElementById('scrollArea');
  setTimeout(() => a.scrollTo({ top: a.scrollHeight, behavior:'smooth' }), 80);
}
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
